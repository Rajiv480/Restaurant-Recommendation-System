<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Restaurant Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="scrolled">
        <a href="/" class="nav-brand" style="font-size: 1.2rem;">RESTAURANT <span style="color: white;">RECOMMENDATION SYSTEM</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
        </div>
    </nav>

    <div class="recommend-container">
        <div class="form-glass" style="text-align: center; max-width: 500px;">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 3.5rem; color: #ff4d4d; margin-bottom: 1.5rem;"></i>
            <h2 style="font-size: 2rem;">Something <span>Went Wrong</span></h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">{{ message }}</p>
            {% if show_back %}
            <a href="/recommend" class="btn btn-primary">Try Again</a>
            {% else %}
            <a href="/" class="btn btn-primary">Back Home</a>
            {% endif %}
        </div>
    </div>

    <footer style="padding: 4rem 10%; border-top: 1px solid var(--border-glass); text-align: center;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 RESTAURANT RECOMMENDATION SYSTEM. ALL RIGHTS RESERVED. <br> COURSE PROJECT.</p>
    </footer>
</body>
</html>
