<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Match | Restaurant Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="scrolled">
        <a href="/" class="nav-brand" style="font-size: 1.2rem;">RESTAURANT <span style="color: white;">RECOMMENDATION SYSTEM</span></a>
        <button class="nav-toggle" id="navToggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/recommend" class="btn-nav">Explore</a>
        </div>
    </nav>

    <div class="recommend-container">
        <div class="form-glass">
            <h2>Search <span>Venues</span></h2>
            <form action="/result" method="post">
                <div class="form-group">
                    <label>Inspiration Restaurant</label>
                    <input type="text" name="restaurant_name" class="form-control" placeholder="Enter a restaurant you love..." required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Preferred Cuisine</label>
                    <select name="cuisine" class="form-control">
                        <option value="">Any Cuisine</option>
                        <option value="north indian">North Indian</option>
                        <option value="south indian">South Indian</option>
                        <option value="chinese">Chinese</option>
                        <option value="mughlai">Mughlai</option>
                        <option value="italian">Italian</option>
                        <option value="continental">Continental</option>
                        <option value="fast food">Fast Food</option>
                        <option value="biryani">Biryani</option>
                        <option value="thai">Thai</option>
                        <option value="seafood">Seafood</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Maximum Budget (₹)</label>
                    <select name="budget" class="form-control">
                        <option value="9999999">No Limit</option>
                        <option value="300">Up to ₹300</option>
                        <option value="500">Up to ₹500</option>
                        <option value="800">Up to ₹800</option>
                        <option value="1000">Up to ₹1,000</option>
                        <option value="1500">Up to ₹1,500</option>
                        <option value="2000">Up to ₹2,000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Minimum Rating</label>
                    <select name="rating" class="form-control">
                        <option value="0">Any Rating</option>
                        <option value="3.5">3.5 & Above</option>
                        <option value="4.0">4.0 & Above</option>
                        <option value="4.5">4.5 & Above</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">
                    Find Similar <i class="fa-solid fa-sparkles"></i>
                </button>
            </form>
        </div>
    </div>

    <footer style="padding: 4rem 10%; border-top: 1px solid var(--border-glass); text-align: center;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 RESTAURANT RECOMMENDATION SYSTEM. ALL RIGHTS RESERVED. <br> COURSE PROJECT.</p>
    </footer>

    <script>
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = navToggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });
    </script>
</body>
</html>
